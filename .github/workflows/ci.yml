name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          # We want LF/CRLF as recorded by .gitattributes, not whatever the runner default is.
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyYAML
        run: python -m pip install --quiet pyyaml

      - name: Run validator (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: bash scripts/validate.sh

      - name: Run validator (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: pwsh scripts/validate.ps1

  shellcheck:
    name: ShellCheck (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning
          scandir: ./scripts
          additional_files: 'install-opencode.sh'

  psanalyzer:
    name: PSScriptAnalyzer (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          # Severity = Error only; style rules (Write-Host, BOM, etc.) are intentional in CLI scripts.
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Severity Error
          if ($results) {
            $results | Format-Table -AutoSize
            exit 1
          }

  markdownlint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            **/*.md
            !node_modules
            !.git

  smoke-install:
    name: Smoke install (${{ matrix.os }})
    needs: [validate]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Smoke — list manifests exist & parse (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -e
          for f in plugin.json .claude-plugin/plugin.json .codex-plugin/plugin.json .agents/plugins/marketplace.json; do
            test -f "$f" || { echo "missing $f"; exit 1; }
            python3 -c "import json,sys; json.load(open(sys.argv[1]))" "$f"
          done
          echo "All four manifests parsed."

      - name: Smoke — list manifests exist & parse (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $files = @('plugin.json','.claude-plugin/plugin.json','.codex-plugin/plugin.json','.agents/plugins/marketplace.json')
          foreach ($f in $files) {
            if (-not (Test-Path $f)) { Write-Error "missing $f"; exit 1 }
            Get-Content $f -Raw | ConvertFrom-Json | Out-Null
          }
          Write-Host "All four manifests parsed."

      - name: Smoke — OpenCode installer dry-run (POSIX)
        if: runner.os != 'Windows'
        shell: bash
        env:
          AGENTS_SYSTEM_SETUP_DRY_RUN: '1'
        run: |
          # Installer should be syntactically valid bash even if we don't execute network steps.
          bash -n scripts/install-opencode.sh
          echo "install-opencode.sh parsed OK"

      - name: Smoke — OpenCode installer dry-run (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          AGENTS_SYSTEM_SETUP_DRY_RUN: '1'
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path scripts/install-opencode.ps1).Path, [ref]$tokens, [ref]$errors) | Out-Null
          if ($errors) { $errors | ForEach-Object { Write-Error $_ }; exit 1 }
          Write-Host "install-opencode.ps1 parsed OK"
