name: Bug report
description: Something isn't working
labels: ["bug"]
body:
  - type: input
    id: runtime
    attributes:
      label: Runtime
      description: Which agent runtime were you using?
      placeholder: "Copilot CLI 1.2.3 / Claude Code 1.0.4 / Codex CLI / OpenCode"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15.2 (arm64) / Ubuntu 24.04 / Windows 11"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: agents-system-setup version
      placeholder: "v0.2.0"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Include the command you ran and the output (redact secrets).
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Run ...
        2. Choose ...
        3. Observe ...
    validations:
      required: true
